  </defs>

  <circle cx="250" cy="250" r="248" fill="url(#ws-glow)"/>
  <circle cx="250" cy="250" r="232" fill="url(#ws-bg)"/>

  <g>
    <path
      d="M 250 20 Q 480 20 480 250 Q 480 405 330 420 Q 250 420 250 340 Q 250 275 330 275 Q 375 275 360 330"
      fill="none"
      stroke="url(#ws-arm)"
      stroke-width="45"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M 250 20 Q 480 20 480 250 Q 480 405 330 420 Q 250 420 250 340 Q 250 275 330 275 Q 375 275 360 330"
      fill="none"
      stroke="url(#ws-arm)"
      stroke-width="45"
      stroke-linecap="round"
      stroke-linejoin="round"
      transform="rotate(180 250 250)"
    />
  </g>

  <circle cx="250" cy="250" r="18" fill="#ffffff" opacity="0.92"/>
  <circle cx="250" cy="250" r="8" fill="#ffffff"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Wormhole">
  <defs>
    <radialGradient id="ws-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="65%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
    <radialGradient id="ws-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ws-arm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f9ff"/>
      <stop offset="55%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>

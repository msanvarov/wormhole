<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Wormhole">
  <defs>
    <radialGradient id="wh-core" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#050507"/>
      <stop offset="22%" stop-color="#2e1065"/>
      <stop offset="52%" stop-color="#6d28d9"/>
      <stop offset="82%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </radialGradient>
    <radialGradient id="wh-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wh-spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="128" cy="128" r="128" fill="url(#wh-glow)"/>
  <circle cx="128" cy="128" r="116" fill="url(#wh-core)"/>

  <g fill="none" stroke-linecap="round">
    <circle cx="128" cy="128" r="98" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2" stroke-dasharray="6 14">
      <animateTransform attributeName="transform" type="rotate" from="0 128 128" to="360 128 128" dur="40s" repeatCount="indefinite"/>
    </circle>
    <circle cx="128" cy="128" r="76" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.8" stroke-dasharray="5 11">
      <animateTransform attributeName="transform" type="rotate" from="360 128 128" to="0 128 128" dur="26s" repeatCount="indefinite"/>
    </circle>
    <circle cx="128" cy="128" r="54" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.5" stroke-dasharray="4 9">
      <animateTransform attributeName="transform" type="rotate" from="0 128 128" to="360 128 128" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="128" cy="128" r="34" stroke="#ffffff" stroke-opacity="0.48" stroke-width="1.2" stroke-dasharray="3 7">
      <animateTransform attributeName="transform" type="rotate" from="360 128 128" to="0 128 128" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="128" cy="128" r="18" stroke="#ffffff" stroke-opacity="0.65" stroke-width="1" stroke-dasharray="2 4">
      <animateTransform attributeName="transform" type="rotate" from="0 128 128" to="360 128 128" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <circle cx="128" cy="128" r="9" fill="url(#wh-spark)">
    <animate attributeName="r" values="7;10;7" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="128" cy="128" r="2.4" fill="#ffffff"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Wormhole tunnel">
  <defs>
    <radialGradient id="wt-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <radialGradient id="wt-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#1d4ed8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wt-arm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="wt-blur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="500" height="500" fill="#040611"/>

  <circle cx="250" cy="250" r="248" fill="url(#wt-glow)" filter="url(#wt-blur)"/>
  <circle cx="250" cy="250" r="220" fill="url(#wt-bg)"/>

  <g transform-origin="250 250">
    <g>
      <path
        d="M 250 30 Q 470 30 470 250 Q 470 400 320 415 Q 250 415 250 340 Q 250 280 320 280 Q 365 280 350 330"
        fill="none"
        stroke="url(#wt-arm)"
        stroke-width="50"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-opacity="0.95"
      />
      <path
        d="M 250 30 Q 470 30 470 250 Q 470 400 320 415 Q 250 415 250 340 Q 250 280 320 280 Q 365 280 350 330"
        fill="none"
        stroke="url(#wt-arm)"
        stroke-width="50"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-opacity="0.95"
        transform="rotate(180 250 250)"
      />
    </g>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="5s"
      repeatCount="indefinite"
    />
  </g>

  <circle cx="250" cy="250" r="22" fill="#ffffff" opacity="0.95"/>
  <circle cx="250" cy="250" r="10" fill="#ffffff"/>

  <circle cx="250" cy="250" r="222" fill="none" stroke="#dbeafe" stroke-width="2" stroke-opacity="0.4"/>
</svg>

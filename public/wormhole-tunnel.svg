<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Wormhole tunnel">
  <defs>
    <radialGradient id="wt-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#020205"/>
      <stop offset="32%" stop-color="#1e0c4f"/>
      <stop offset="62%" stop-color="#4c1d95"/>
      <stop offset="86%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </radialGradient>
    <radialGradient id="wt-center" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#ddd6fe" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wt-outerglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="80%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="#06060a"/>

  <g>
    <circle cx="200" cy="200" r="190" fill="url(#wt-bg)"/>
    <circle cx="200" cy="200" r="190" fill="url(#wt-outerglow)"/>
  </g>

  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <ellipse cx="200" cy="200" rx="178" ry="52" stroke-opacity="0.14" stroke-width="1.4" stroke-dasharray="9 14" transform="rotate(-8 200 200)">
      <animateTransform attributeName="transform" type="rotate" from="-8 200 200" to="352 200 200" dur="60s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="200" cy="200" rx="148" ry="42" stroke-opacity="0.18" stroke-width="1.3" stroke-dasharray="7 12" transform="rotate(22 200 200)">
      <animateTransform attributeName="transform" type="rotate" from="382 200 200" to="22 200 200" dur="40s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="200" cy="200" rx="120" ry="34" stroke-opacity="0.24" stroke-width="1.2" stroke-dasharray="6 10" transform="rotate(-30 200 200)">
      <animateTransform attributeName="transform" type="rotate" from="-30 200 200" to="330 200 200" dur="28s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="200" cy="200" rx="94" ry="26" stroke-opacity="0.3" stroke-width="1.1" stroke-dasharray="5 8" transform="rotate(50 200 200)">
      <animateTransform attributeName="transform" type="rotate" from="410 200 200" to="50 200 200" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="200" cy="200" rx="70" ry="20" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4 6" transform="rotate(-12 200 200)">
      <animateTransform attributeName="transform" type="rotate" from="-12 200 200" to="348 200 200" dur="14s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="200" cy="200" rx="48" ry="14" stroke-opacity="0.5" stroke-width="0.9" stroke-dasharray="3 5" transform="rotate(75 200 200)">
      <animateTransform attributeName="transform" type="rotate" from="435 200 200" to="75 200 200" dur="9s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="200" cy="200" rx="30" ry="9" stroke-opacity="0.6" stroke-width="0.8" stroke-dasharray="2 4" transform="rotate(-50 200 200)">
      <animateTransform attributeName="transform" type="rotate" from="-50 200 200" to="310 200 200" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="200" cy="200" rx="16" ry="5" stroke-opacity="0.7" stroke-width="0.7" stroke-dasharray="1.5 3" transform="rotate(30 200 200)">
      <animateTransform attributeName="transform" type="rotate" from="390 200 200" to="30 200 200" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <circle cx="200" cy="200" r="44" fill="url(#wt-center)">
    <animate attributeName="r" values="40;48;40" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="4" fill="#ffffff"/>
</svg>
